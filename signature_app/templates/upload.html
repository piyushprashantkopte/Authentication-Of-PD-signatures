<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PD Auth - Upload & Select User</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute -top-24 -left-24 w-96 h-96 bg-blue-100 rounded-full mix-blend-multiply filter blur-3xl opacity-60"></div>
        <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-indigo-100 rounded-full mix-blend-multiply filter blur-3xl opacity-60"></div>
    </div>

    <div class="max-w-xl w-full">
        <a href="{% url 'index_hub' %}" class="inline-flex items-center text-sm font-medium text-slate-500 hover:text-blue-600 transition-colors mb-6 group">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2 transition-transform group-hover:-translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Back to Dashboard
        </a>

        <div class="glass-card rounded-[2.5rem] shadow-2xl p-10 relative overflow-hidden">
            <div class="relative z-10">
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-extrabold text-slate-900 mb-2">Signature <span class="text-blue-600">Verification</span></h2>
                    <p class="text-slate-500 text-sm">Select user and upload movement data for Parkinson's analysis.</p>
                </div>

                <form action="{% url 'authenticate_file' %}" method="post" enctype="multipart/form-data" class="space-y-6">
                    {% csrf_token %}
                    
                    <div class="space-y-2">
                        <label for="user_id" class="block text-sm font-bold text-slate-700 ml-1">Claimed Identity</label>
                        <div class="relative">
                            <select id="user_id" name="user_id" required 
                                class="block w-full px-4 py-4 bg-white border border-slate-200 rounded-2xl text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent appearance-none transition-all cursor-pointer">
                                <option value="" disabled selected>Choose a User (1-40)</option>
                                {% for i in "x"|rjust:"40" %}
                                    <option value="{{ forloop.counter }}">User {{ forloop.counter }}</option>
                                {% endfor %}
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
                                <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-sm font-bold text-slate-700 ml-1">SVC2004 Data File</label>
                        <label for="signature_file" class="flex flex-col items-center justify-center w-full h-48 border-2 border-dashed border-slate-200 rounded-3xl bg-slate-50/50 cursor-pointer transition-all hover:border-blue-400 hover:bg-blue-50/30 group">
                            <div class="flex flex-col items-center justify-center py-4">
                                <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                                    </svg>
                                </div>
                                <p class="text-xs font-semibold text-slate-600"><span class="text-blue-600">Click to upload</span> .txt file</p>
                            </div>
                            <input id="signature_file" name="signature_file" type="file" class="hidden" accept=".txt" required onchange="updateFileName(this)" />
                        </label>
                        <div id="file-name-display" class="hidden mt-2 p-2 bg-blue-50 rounded-xl text-blue-700 text-[10px] font-bold text-center italic uppercase tracking-wider"></div>
                    </div>

                    <button type="submit" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold text-lg shadow-xl hover:bg-slate-800 hover:-translate-y-1 transition-all active:scale-[0.98]">
                        Verify Identity
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function updateFileName(input) {
            const display = document.getElementById('file-name-display');
            if (input.files && input.files.length > 0) {
                display.innerText = "Selected: " + input.files[0].name;
                display.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
