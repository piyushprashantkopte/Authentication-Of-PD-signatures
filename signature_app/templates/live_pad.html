<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PD Signature Auth</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #f4f7f6; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 400px; }
        h2 { color: #333; margin-top: 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #666; }
        select, input, button { width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Verify Signature</h2>
        <form method="post" action="{% url 'authenticate_file' %}" enctype="multipart/form-data">
            {% csrf_token %}
            
            <label>Who are you?</label>
            <select name="user_id" required>
                {% for i in user_ids %}
                    <option value="{{ i }}">User {{ i }}</option>
                {% endfor %}
            </select>

            <label>Upload Signature (.txt)</label>
            <input type="file" name="signature_file" accept=".txt" required>

            <button type="submit">Run Authentication</button>
        </form>
    </div>
</body>
</html>
