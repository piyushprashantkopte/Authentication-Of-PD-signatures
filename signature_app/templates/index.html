<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PD Auth - Choose Method</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .hub-container { text-align: center; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .options { display: flex; gap: 20px; margin-top: 30px; }
        .option-card { border: 2px solid #e0e0e0; border-radius: 10px; padding: 20px; width: 200px; cursor: pointer; transition: 0.3s; text-decoration: none; color: inherit; }
        .option-card:hover { border-color: #1a73e8; background: #f8fbff; transform: translateY(-5px); }
        .icon { font-size: 40px; margin-bottom: 10px; }
        h2 { color: #333; }
        p { color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <div class="hub-container">
        <h2>Signature Authentication</h2>
        <p>Please select your input method to continue</p>
        <div class="options">
            <a href="{% url 'upload_page' %}" class="option-card">
                <div class="icon">📁</div>
                <h3>File Upload</h3>
                <p>Upload a .TXT file (SVC2004 format)</p>
            </a>
            <a href="{% url 'live_page' %}" class="option-card">
                <div class="icon">✍️</div>
                <h3>Live Pad</h3>
                <p>Sign directly on the screen</p>
            </a>
        </div>
    </div>
</body>
</html>
