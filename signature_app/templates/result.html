<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Authentication Result</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #f4f7f6; }
        .result-card { background: white; padding: 2rem; border-radius: 8px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 500px; border-top: 10px solid {{ color }}; }
        .status { font-size: 24px; font-weight: bold; color: {{ color }}; margin-bottom: 15px; }
        .details { color: #555; margin-bottom: 20px; line-height: 1.6; }
        .confidence { font-size: 14px; color: #999; }
        .back-btn { display: inline-block; padding: 10px 20px; background: #333; color: white; text-decoration: none; border-radius: 4px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="result-card">
        <div class="status">{{ status }}</div>
        <p class="details">{{ message }}</p>
        <p class="confidence">AI Confidence Score: {{ confidence }}</p>
        <a href="{% url 'upload_page' %}" class="back-btn">Try Again</a>
    </div>
</body>
</html>
